<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มบันทึกข้อมูลนักเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">ระบบบันทึกข้อมูลนักเรียน</h2>
        
        <form id="studentForm" onsubmit="submitForm(event)" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">คำนำหน้าชื่อ</label>
                <select id="prefix" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="">-- เลือกคำนำหน้าชื่อ --</option>
                    <option value="เด็กชาย">เด็กชาย</option>
                    <option value="เด็กหญิง">เด็กหญิง</option>
                    <option value="นาย">นาย</option>
                    <option value="นางสาว">นางสาว</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">ชื่อ</label>
                    <input type="text" id="firstName" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">นามสกุล</label>
                    <input type="text" id="lastName" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">ชั้น ม.</label>
                    <select id="grade" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <option value="1">ม.1</option>
                        <option value="2">ม.2</option>
                        <option value="3">ม.3</option>
                        <option value="4">ม.4</option>
                        <option value="5">ม.5</option>
                        <option value="6">ม.6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">ห้อง</label>
                    <input type="number" id="room" min="1" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">เลขที่</label>
                    <input type="number" id="no" min="1" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-1">เลขประจำตัวนักเรียน (5 หลัก)</label>
                <input type="text" id="studentId" pattern="\d{5}" maxlength="5" placeholder="เช่น 12345" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">น้ำหนัก (ก.ก.)</label>
                    <input type="number" id="weight" step="0.1" min="1" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">ส่วนสูง (ซ.ม.)</label>
                    <input type="number" id="height" step="0.1" min="1" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition duration-200">
                บันทึกข้อมูล
            </button>
        </form>
    </div>

    <script>
        // กำหนด URL ของ Google Apps Script ที่ระบุมา
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyC1WT0ttLYXKMblfR4ixR3DVQIw73cIOaEVtxkisDSFICZAipgf3eKeyBHAgrdRv8D/exec";

        // ฟังก์ชัน callback ที่จะถูกเรียกเมื่อ JSONP ตอบกลับมาสำเร็จ
        function onJsonpSuccess(response) {
            // ลบแท็ก script ชั่วคราวที่สร้างขึ้นออกไปเพื่อรักษาความสะอาดของ DOM
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();

            if (response.result === "success") {
                // แสดงสถานะบันทึกสำเร็จ
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ!',
                    text: 'ข้อมูลนักเรียนถูกบันทึกลงในชีตเรียบร้อยแล้ว',
                    confirmButtonColor: '#2563eb'
                });
                document.getElementById('studentForm').reset(); // เคลียร์ฟอร์ม
            } else {
                // กรณีเกิดข้อผิดพลาดจากฝั่ง Server
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: response.message || 'ไม่สามารถบันทึกข้อมูลได้',
                });
            }
        }

        // ฟังก์ชันจัดการการส่งฟอร์ม
        function submitForm(event) {
            event.preventDefault(); // ป้องกันการรีเฟรชหน้าจอ

            // แสดง SweetAlert กำลังโหลด (ขณะรอการบันทึก)
            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // ดึงค่าจากฟอร์ม
            const formData = {
                prefix: document.getElementById('prefix').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                grade: document.getElementById('grade').value,
                room: document.getElementById('room').value,
                no: document.getElementById('no').value,
                studentId: document.getElementById('studentId').value,
                weight: document.getElementById('weight').value,
                height: document.getElementById('height').value,
                callback: 'onJsonpSuccess' // ระบุชื่อฟังก์ชันสำหรับ JSONP Callback
            };

            // แปลงออบเจกต์ข้อมูลให้เป็น Query String
            const queryString = Object.keys(formData)
                .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(formData[key]))
                .join('&');

            // สร้าง Element <script> เพื่อส่งคำขอแบบ JSONP (ข้าม CORS ได้แน่นอน)
            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = `${WEB_APP_URL}?${queryString}`;
            
            // กรณีเกิดข้อผิดพลาดในการโหลด Script (เช่น URL ผิด หรือเน็ตหลุด)
            script.onerror = function() {
                Swal.fire({
                    icon: 'error',
                    title: 'การเชื่อมต่อล้มเหลว',
                    text: 'ไม่สามารถติดต่อกับเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง',
                });
            };

            // แนบสคริปต์เข้าไปใน body เพื่อเริ่มส่งข้อมูล
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
